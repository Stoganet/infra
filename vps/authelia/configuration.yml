server:
  address: 'tcp://:9091'

log:
  level: 'info'

totp:
  issuer: 'authelia.com'
  period: 30
  skew: 1

identity_validation:
  reset_password:
    jwt_secret: '{{ secret "/secrets/jwt_secret" }}'

authentication_backend:
  file:
    path: '/config/users_database.yml'
    password:
      algorithm: 'argon2id'

access_control:
  default_policy: 'one_factor'
  rules:
    - domain: 'netbird.{{ env "DOMAIN" }}'
      policy: 'two_factor'

session:
  secret: '{{ secret "/secrets/session_secret" }}'
  cookies:
    - name: 'authelia_session'
      domain: '{{ env "DOMAIN" }}'
      authelia_url: 'https://auth.{{ env "DOMAIN" }}'
      expiration: '7d'
      inactivity: '24h'
      remember_me: '30d'

storage:
  encryption_key: '{{ secret "/secrets/storage_encryption_key" }}'
  local:
    path: '/data/db.sqlite3'

notifier:
  filesystem:
    filename: '/data/notification.txt'

identity_providers:
  oidc:
    hmac_secret: '{{ secret "/secrets/oidc_hmac_secret" }}'
    jwks:
      - key_id: 'main'
        algorithm: 'RS256'
        use: 'sig'
        key: {{ secret "/secrets/oidc_jwks_key" | mindent 10 "|" | msquote }}
    clients:
      - client_id: 'netbird'
        client_name: 'Netbird'
        client_secret: '{{ secret "/secrets/netbird_client_secret" }}'
        public: false
        authorization_policy: 'two_factor'
        redirect_uris:
          - 'https://netbird.{{ env "DOMAIN" }}/nb-auth'
          - 'https://netbird.{{ env "DOMAIN" }}/silent-auth'
          - 'https://netbird.{{ env "DOMAIN" }}/oauth2/callback'
        scopes:
          - 'openid'
          - 'profile'
          - 'email'
          - 'groups'
        token_endpoint_auth_method: 'client_secret_post'
