name: Bump api-proxy digest

on:
  repository_dispatch:
    types: [api-proxy-bump]

permissions:
  contents: write

concurrency:
  group: api-proxy-bump
  cancel-in-progress: false

jobs:
  bump:
    name: bump api-proxy digest in compose
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Preflight
        env:
          BOT_PUSH_TOKEN: ${{ secrets.BOT_PUSH_TOKEN }}
          PAYLOAD_SHA: ${{ github.event.client_payload.sha }}
          PAYLOAD_DIGEST: ${{ github.event.client_payload.digest }}
        run: |
          set -euo pipefail
          [ -n "${BOT_PUSH_TOKEN:-}" ] || { echo "::error::BOT_PUSH_TOKEN not set"; exit 1; }
          [[ "$PAYLOAD_SHA" =~ ^[a-f0-9]{40}$ ]] || { echo "::error::invalid sha: '$PAYLOAD_SHA'"; exit 1; }
          [[ "$PAYLOAD_DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "::error::invalid digest: '$PAYLOAD_DIGEST'"; exit 1; }

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.BOT_PUSH_TOKEN }}
          ref: main
          fetch-depth: 1

      - name: Bump digest
        env:
          PAYLOAD_SHA: ${{ github.event.client_payload.sha }}
          PAYLOAD_DIGEST: ${{ github.event.client_payload.digest }}
        run: |
          set -euo pipefail
          grep -qE "ghcr\.io/[^[:space:]]+/api-proxy@sha256:[a-f0-9]+" compose/docker-compose.yml \
            || { echo "::error::api-proxy image not found in compose/docker-compose.yml"; exit 1; }
          sed -i -E "s|(ghcr\.io/[^[:space:]]+/api-proxy)@sha256:[a-f0-9]+|\1@${PAYLOAD_DIGEST}|" compose/docker-compose.yml
          git diff --quiet compose/docker-compose.yml && exit 0
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add compose/docker-compose.yml
          git commit -m "chore(deps): bump api-proxy to ${PAYLOAD_SHA}"
          git push origin main
