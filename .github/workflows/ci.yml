name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  compose-validate:
    name: compose validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Prepare stub env
        run: cp compose/.env.example compose/.env

      - name: Validate compose stack
        run: docker compose -f compose/docker-compose.yml config -q

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz gitleaks
          ./gitleaks version

      - name: Run gitleaks
        run: ./gitleaks detect --source=. --no-banner --redact

  arrconfig-validate:
    name: arrconfig validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Validate JSON files parse
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(compose/arrconfig/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No arrconfig JSON files found; nothing to validate."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "Checking $f"
            jq empty "$f"
          done
