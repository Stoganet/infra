name: services

services:
  traefik:
    image: traefik:v3@sha256:6b9cbca6fac42ab0075f5437d8dc1685cfd188626d8d515839ea94f8b6271c42
    container_name: traefik
    restart: unless-stopped
    env_file: .env
    mem_limit: 256m
    pids_limit: 65536
    dns:
      - 9.9.9.9
      - 1.1.1.1
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
      - "${NETBIRD_IP}:80:80"
      - "${NETBIRD_IP}:443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_certs:/certs
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  portainer:
    image: portainer/portainer-ce:2.39.1@sha256:1ae8e65d50ca5498cb2c33e617495a1e3ef245b0d2392b4a44c70ae09b822891
    container_name: portainer
    restart: unless-stopped
    mem_limit: 256m
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  jellyfin:
    image: jellyfin/jellyfin:10.11.8@sha256:1694ff069f0c9dafb283c36765175606866769f5d72f2ed56b6a0f1be922fc37
    container_name: jellyfin
    user: ${PUID}:${PGID}
    restart: unless-stopped
    mem_limit: 1.5g
    dns:
      - 9.9.9.9
      - 1.1.1.1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - ${VIDEO_GID}
      - ${RENDER_GID}
    environment:
      - TZ=${TZ}
      - JELLYFIN_CACHE_DIR=/cache
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - /mnt/wd/media:/media:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=letsencrypt"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"

  gluetun:
    image: qmcgaw/gluetun:v3.40.0@sha256:2b42bfa046757145a5155acece417b65b4443c8033fb88661a8e9dcf7fda5a00
    container_name: gluetun
    restart: unless-stopped
    mem_limit: 256m
    dns:
      - 9.9.9.9
      - 1.1.1.1
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "${NETBIRD_IP}:8080:8080"
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_PROVIDER}
      - VPN_TYPE=${VPN_TYPE:-wireguard}
      - WIREGUARD_PRIVATE_KEY=${VPN_PRIVATE_KEY}
      - SERVER_COUNTRIES=${VPN_SERVER_COUNTRIES:-}
      - PORT_FORWARD_ONLY=on
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'wget -qO- --retry-connrefused --post-data "json={\"listen_port\":{{PORT}},\"current_network_interface\":\"{{VPN_INTERFACE}}\",\"random_port\":false,\"upnp\":false}" http://127.0.0.1:8080/api/v2/app/setPreferences'
      - TZ=${TZ}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbit.${DOMAIN}`)"
      - "traefik.http.routers.qbittorrent.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent.tls.certresolver=letsencrypt"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest@sha256:eeea9f8a8cdde23555186843d26e8ded1222421f31f98a5cc1b50c2882ebcf4e
    container_name: qbittorrent
    restart: unless-stopped
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - qbittorrent_config:/config
      - /mnt/wd/media:/data

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest@sha256:c9fe528f34b1fd3715438b6f6d6991d64e2965f2c055db36398bc66a0e7eab01
    container_name: prowlarr
    restart: unless-stopped
    mem_limit: 256m
    dns:
      - 9.9.9.9
      - 1.1.1.1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - prowlarr_config:/config
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN}`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.3.21@sha256:f104ee51e5124d83cf3be9b37480649355d223f7d8f9e453d0d5ef06c6e3b31b
    container_name: flaresolverr
    restart: unless-stopped
    mem_limit: 512m
    dns:
      - 9.9.9.9
      - 1.1.1.1
    security_opt:
      - no-new-privileges:true
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    networks:
      - internal

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest@sha256:0b5c4803f92456fb9b65bae8375716ea120b4ea17b3cced7da32b63f0085782b
    container_name: sonarr
    restart: unless-stopped
    mem_limit: 384m
    dns:
      - 9.9.9.9
      - 1.1.1.1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - sonarr_config:/config
      - /mnt/wd/media:/data
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"

  radarr:
    image: lscr.io/linuxserver/radarr:latest@sha256:079e48870584baf2a3e7e43e7ba6d3c834555931851a59c82c51cc792d285caf
    container_name: radarr
    restart: unless-stopped
    mem_limit: 384m
    dns:
      - 9.9.9.9
      - 1.1.1.1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - radarr_config:/config
      - /mnt/wd/media:/data
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest@sha256:95f27692c3de6dbe130cd035d342d8138ec74ade7b62cfc52e11ae222c52c855
    container_name: bazarr
    restart: unless-stopped
    mem_limit: 384m
    dns:
      - 9.9.9.9
      - 1.1.1.1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - bazarr_config:/config
      - /mnt/wd/media:/data
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.${DOMAIN}`)"
      - "traefik.http.routers.bazarr.entrypoints=websecure"
      - "traefik.http.routers.bazarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"

  jellyseerr:
    image: ghcr.io/seerr-team/seerr:latest@sha256:c4cbd5121236ac2f70a843a0b920b68a27976be57917555f1c45b08a1e6b2aad
    container_name: jellyseerr
    restart: unless-stopped
    init: true
    mem_limit: 512m
    dns:
      - 9.9.9.9
      - 1.1.1.1
    security_opt:
      - no-new-privileges:true
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    volumes:
      - jellyseerr_config:/app/config
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seerr.rule=Host(`seerr.${DOMAIN}`)"
      - "traefik.http.routers.seerr.entrypoints=websecure"
      - "traefik.http.routers.seerr.tls.certresolver=letsencrypt"
      - "traefik.http.services.seerr.loadbalancer.server.port=5055"

  mcp-server:
    image: ghcr.io/stoganet/mcp@sha256:f002c25bb3498dce54c60a316e1bdbcc991d7a4c3b780273590eaadefae6d09a
    container_name: mcp-server
    restart: unless-stopped
    mem_limit: 128m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    group_add:
      - "${DOCKER_GID}"
    environment:
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_API_KEY=${RADARR_API_KEY}
      - PROWLARR_API_KEY=${PROWLARR_API_KEY}
      - BAZARR_API_KEY=${BAZARR_API_KEY}
      - QBIT_USERNAME=${QBIT_USERNAME}
      - QBIT_PASSWORD=${QBIT_PASSWORD}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/wd:/mnt/wd:ro
    networks:
      - internal

  openclaw:
    image: ghcr.io/openclaw/openclaw:2026.6.1@sha256:b12f76a7947e4cdd328bf3ea1045d41a5494b33852c911e9bc4fdd03dde469d5
    container_name: openclaw
    restart: unless-stopped
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USER_ID=${TELEGRAM_ALLOWED_USER_ID}
      - OPENCLAW_CONFIG_PATH=/home/node/.openclaw/openclaw.json5
    volumes:
      - openclaw_config:/home/node/.openclaw
      - ./openclaw/openclaw.json5:/home/node/.openclaw/openclaw.json5:ro
      - ./openclaw/AGENTS.md:/home/node/.openclaw/workspace/AGENTS.md:ro
      - ./openclaw/skills:/home/node/.openclaw/custom-skills:ro
    networks:
      - internal

  api-proxy:
    image: ghcr.io/stoganet/api-proxy@sha256:b4e78ea0a02ea767cf7824e7216859e774beecafe17fbe601adeea50f9dd9cc1
    container_name: api-proxy
    restart: unless-stopped
    mem_limit: 256m
    dns:
      - 9.9.9.9
      - 1.1.1.1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - JELLYFIN_URL=http://jellyfin:8096
      - JELLYFIN_API_KEY=${API_PROXY_JF_API_KEY}
      - JWT_SIGNING_KEY=${API_PROXY_JWT_KEY}
      - PROXY_BASE_URL=${PROXY_BASE_URL}
      - DB_PATH=/data/api-proxy.sqlite
      - LISTEN_ADDR=:8080
      - TZ=${TZ}
    volumes:
      - api_proxy_data:/data
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-proxy.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.api-proxy.entrypoints=websecure"
      - "traefik.http.routers.api-proxy.tls.certresolver=letsencrypt"
      - "traefik.http.services.api-proxy.loadbalancer.server.port=8080"

networks:
  internal:
    driver: bridge

volumes:
  openclaw_config:
  portainer_data:
  traefik_certs:
  jellyfin_config:
  jellyfin_cache:
  qbittorrent_config:
  prowlarr_config:
  sonarr_config:
  radarr_config:
  bazarr_config:
  jellyseerr_config:
  api_proxy_data:
